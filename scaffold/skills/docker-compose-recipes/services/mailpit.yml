# Mailpit — maintained email capture for local development
# Env vars: MAILPIT_SMTP_PORT (default 1025), MAILPIT_UI_PORT (default 8025)
# Application-side SMTP config: SMTP_HOST=mailpit; SMTP_PORT=1025

mailpit:
  image: axllent/mailpit:v1.30
  restart: unless-stopped
  ports:
    - "${MAILPIT_SMTP_PORT:-1025}:1025"
    - "${MAILPIT_UI_PORT:-8025}:8025"
  environment:
    MP_MAX_MESSAGES: ${MAILPIT_MAX_MESSAGES:-500}
    MP_DATABASE: /data/mailpit.db
  volumes:
    - mailpit_data:/data
  healthcheck:
    test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8025"]
    interval: 10s
    timeout: 3s
    retries: 5
    start_period: 5s

